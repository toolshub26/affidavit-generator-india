<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center}
.container{max-width:500px;margin:auto;padding:20px}
.card{background:#222;padding:15px;margin:10px;border-radius:8px}
button{padding:10px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.withdraw{background:#ff5722;color:#fff}
</style>

</head>

<body>

<div class="container">

<h2>👤 Dashboard</h2>

<div class="card" id="info">Loading...</div>

<button onclick="openTool()">🚀 Open Premium Tool</button>
<button class="withdraw" onclick="withdraw()">💸 Withdraw</button>
<button onclick="logout()">Logout</button>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC_1bKbNGAoGviGt1-a1f27h9VDj4hr3oA",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
  storageBucket: "affidavittool.firebasestorage.app",
  messagingSenderId: "108525725649",
  appId: "1:108525725649:web:2c3cab440860c81e6de2f0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ================= LOAD USER =================
auth.onAuthStateChanged(user=>{

  if(!user){
    location.href = "index.html";
    return;
  }

  db.collection("users").doc(user.uid).get()
  .then(doc=>{

    let d = doc.data();
    let now = Date.now();

    // 🔥 expiry fix
    if(d.expiry && now > d.expiry){
      db.collection("users").doc(user.uid).update({ premium:false });
      d.premium = false;
    }

    let premiumText = d.premium ? "Active ✅" : "Free ❌";

    document.getElementById("info").innerHTML = `
    📧 ${user.email}<br><br>
    💰 Wallet: ₹${d.wallet || 0}<br>
    ⭐ Premium: ${premiumText}<br>
    🎁 Referral Code: ${d.refCode || "N/A"}
    `;

  });

});

// ================= WITHDRAW =================
function withdraw(){

  let amount = prompt("Enter amount ₹");
  let upi = prompt("Enter UPI ID");

  let user = auth.currentUser;

  if(!amount || !upi){
    alert("Fill all fields ❗");
    return;
  }

  amount = Number(amount);

  if(isNaN(amount) || amount <= 0){
    alert("Invalid amount ❌");
    return;
  }

  db.collection("users").doc(user.uid).get()
  .then(doc=>{

    let d = doc.data();
    let wallet = Number(d.wallet || 0);

    if(wallet < amount){
      alert("Insufficient Balance ❌");
      return;
    }

    // 💰 deduct wallet
    db.collection("users").doc(user.uid).update({
      wallet: wallet - amount
    });

    // 📩 save withdraw request
    db.collection("withdraws").add({
      uid: user.uid,
      email: user.email,
      amount: amount,
      upi: upi,
      status: "pending",
      time: Date.now()
    });

    alert("Withdraw Request Sent ✅");

    location.reload(); // refresh dashboard

  });

}

// ================= OPEN TOOL =================
function openTool(){
  location.href = "premium.html";
}

// ================= LOGOUT =================
function logout(){
  auth.signOut();
  location.href = "index.html";
}

</script>

</body>
</html>
