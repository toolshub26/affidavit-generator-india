<style>

/* =========================================
RESET
========================================= */

margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;

}

body{

linear-gradient(
135deg,

font-family:'Inter',sans-serif;

overflow-x:hidden;
overflow-y:auto;

min-height:100vh;

}

/* =========================================
TOPBAR
========================================= */

.topbar{

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

position:sticky;
top:0;

z-index:9999;

background:
linear-gradient(
135deg,
#111827,
#1e293b
);

border-bottom:
1px solid rgba(255,255,255,.08);

}

/* =========================================
BACK BUTTON FIX
========================================= */

.back-btn{

background:#dc2626;

padding:12px 18px;

border:none;

border-radius:14px;

font-weight:700;

color:white;

cursor:pointer;

}

/* =========================================
LOGO
========================================= */

.logo h1{

font-size:32px;

font-weight:800;

}

.logo p{

opacity:.8;

margin-top:6px;

}

/* =========================================
BUTTONS
========================================= */

.top-actions{

display:flex;

gap:12px;

flex-wrap:wrap;

}

button{

border:none;

padding:14px 18px;

border-radius:14px;

font-weight:700;

cursor:pointer;

transition:.25s;

color:white;

}

button:hover{

transform:translateY(-2px);

}

.primary{
background:#2563eb;
}

.green{
background:#059669;
}

.orange{
background:#ea580c;
}

.red{
background:#dc2626;
}

.purple{
background:#7c3aed;
}

/* =========================================
MAIN
========================================= */

.main{

max-width:1700px;

margin:auto;

padding:30px;

display:grid;

grid-template-columns:390px 1fr;

gap:30px;

align-items:start;

}

/* =========================================
SIDEBAR
========================================= */

.sidebar{

background:#111827;

padding:25px;

border-radius:24px;

position:sticky;

top:110px;

height:auto;

overflow:visible;

}

/* =========================================
NO HIDDEN BUTTONS FIX
========================================= */

.sidebar button{

width:100%;

display:block;

visibility:visible !important;

opacity:1 !important;

position:relative;

z-index:10;

}

/* =========================================
INPUTS
========================================= */

.label{

display:block;

margin-top:15px;

margin-bottom:8px;

font-weight:700;

}

.input,
.select,
.textarea{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:#1f2937;

color:white;

font-size:14px;

outline:none;

}

.textarea{

min-height:100px;

resize:vertical;

}

/* =========================================
BUTTON GRID
========================================= */

.btn-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

margin-top:20px;

margin-bottom:20px;

}

/* =========================================
SIGNATURE FIX
========================================= */

#signaturePad{

width:100%;

height:180px;

background:white;

border-radius:16px;

margin-top:10px;

touch-action:none;

}

/* =========================================
ANALYTICS
========================================= */

.analytics{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:20px;

margin-bottom:25px;

}

.stat{

background:#111827;

padding:20px;

border-radius:22px;

text-align:center;

}

.stat h3{

font-size:30px;

margin-top:10px;

}

/* =========================================
PREVIEW
========================================= */

.preview{

background:white;

color:#111827;

border-radius:24px;

padding:40px;

min-height:1100px;

position:relative;

overflow:hidden;

}

/* =========================================
SIGNATURE LEFT FIX
========================================= */

.signature-box{

margin-top:30px;

text-align:left !important;

display:flex;

justify-content:flex-start;

}

/* =========================================
WATERMARK
========================================= */

.watermark{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%)
rotate(-30deg);

font-size:90px;

font-weight:800;

color:rgba(0,0,0,.04);

pointer-events:none;

}

/* =========================================
STAMP
========================================= */

.stamp{

position:absolute;

top:25px;
right:25px;

width:90px;
height:90px;

border:3px solid #dc2626;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:20px;
font-weight:800;

color:#dc2626;

transform:rotate(-15deg);

}

/* =========================================
DOC
========================================= */

.doc-title{

text-align:center;

font-size:46px;

font-family:
'Cormorant Garamond',
serif;

margin-top:20px;

}

.doc-sub{

text-align:center;

margin-top:10px;

margin-bottom:40px;

letter-spacing:2px;

}

.doc-content{

line-height:2;

font-size:18px;

}

/* =========================================
RESPONSIVE
========================================= */

@media(max-width:1100px){

.main{

grid-template-columns:1fr;

}

.sidebar{

position:relative;

top:0;

}

.btn-grid{

grid-template-columns:1fr;

}

.preview{

padding:20px;

}

}

/* =========================================
MOBILE FIX
========================================= */

@media(max-width:768px){

body{

padding-bottom:80px;

}

.topbar{

padding:16px;

}

.logo h1{

font-size:24px;

}

.main{

padding:14px;

gap:25px;

}

.sidebar{

padding:18px;

overflow:visible;

}

.preview{

padding:16px;

min-height:auto;

}

.doc-title{

font-size:32px;

}

.watermark{

font-size:50px;

}

button{

font-size:14px;

padding:14px;

}

}

/* =========================================
PRINT
========================================= */

@media print{

.sidebar,
.topbar,
.analytics{

display:none !important;

}

.preview{

box-shadow:none;

width:100%;

}

}

</style>

</head>

<body>

<!-- =========================================
TOPBAR
========================================= -->

<div class="topbar">

<div>

<button
class="back-btn"
onclick="goBackPage()">

⬅ Back

</button>

</div>

<div class="logo">

<h1>
⚖️ AGI ULTRA PRO v18 AI
</h1>

<p>
Enterprise Premium Legal SaaS Platform
</p>

</div>

<div class="top-actions">

<button class="green"
onclick="generateQRCode()">

QR Verify

</button>

<button class="purple"
onclick="shareWhatsApp()">

WhatsApp

</button>

<button class="orange"
onclick="downloadPDF()">

PDF

</button>

<button class="primary"
onclick="triggerInstallApp()">

📲 PWA

</button>

<button class="red"
onclick="window.print()">

🖨 Print

</button>

</div>

</div>

<!-- =========================================
MAIN
========================================= -->

<div class="main">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>
Generate Affidavit
</h2>

<label class="label">
Purpose
</label>

<select class="select"
id="purposeType">

<option>Name Change</option>
<option>Marriage Affidavit</option>
<option>Income Proof</option>
<option>Birth Affidavit</option>

</select>

<label class="label">
Full Name
</label>

<input
class="input"
id="name">

<label class="label">
Father Name
</label>

<input
class="input"
id="father">

<label class="label">
Age
</label>

<input
class="input"
id="age">

<label class="label">
Details
</label>

<textarea
class="textarea"
id="details"></textarea>

<label class="label">
Signature
</label>

<canvas id="signaturePad"></canvas>

<div class="btn-grid">

<button
class="orange"
onclick="clearSignature()">

Clear Sign

</button>

<button
class="primary"
onclick="generateAffidavit()">

Generate

</button>

</div>

</div>

<!-- RIGHT -->

<div>

<div class="analytics">

<div class="stat">
📄
<h3 id="totalDocs">0</h3>
<p>Total Docs</p>
</div>

<div class="stat">
⭐
<h3>Premium</h3>
<p>Enterprise</p>
</div>

<div class="stat">
🤖
<h3>AI</h3>
<p>Smart Engine</p>
</div>

</div>

<div class="preview">

<div class="watermark">
AGI ULTRA
</div>

<div id="previewArea">

<div class="stamp">
₹10
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>
Your affidavit preview will appear here.
</p>

</div>

</div>

</div>

</div>

</div>

<script>

/* =========================================
SIGNATURE FIX
========================================= */

let signaturePad;

window.onload = ()=>{

const canvas =
document.getElementById(
"signaturePad"
);

resizeCanvas();

signaturePad =
new SignaturePad(canvas,{

backgroundColor:"white",
penColor:"black"

});

window.addEventListener(
"resize",
resizeCanvas
);

};

function resizeCanvas(){

const canvas =
document.getElementById(
"signaturePad"
);

const ratio =
Math.max(
window.devicePixelRatio || 1,
1
);

canvas.width =
canvas.offsetWidth * ratio;

canvas.height =
180 * ratio;

canvas.getContext("2d")
.scale(ratio,ratio);

}

/* =========================================
BACK FIX
========================================= */

function goBackPage(){

if(window.history.length > 1){

window.history.back();

}else{

window.location.href =
"./index.html";

}

}

/* =========================================
SIGNATURE CLEAR
========================================= */

function clearSignature(){

signaturePad.clear();

}

/* =========================================
GENERATE
========================================= */

function generateAffidavit(){

const name =
document.getElementById(
"name"
).value;

const father =
document.getElementById(
"father"
).value;

const age =
document.getElementById(
"age"
).value;

const details =
document.getElementById(
"details"
).value;

const purpose =
document.getElementById(
"purposeType"
).value;

const signature =
signaturePad.isEmpty()
?
""
:
signaturePad.toDataURL();

document.getElementById(
"previewArea"
).innerHTML = `

<div class="stamp">
₹10
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>

I,
<b>${name}</b>,
S/o
<b>${father}</b>,
aged about
<b>${age}</b>
years.

</p>

<p>

Purpose:
<b>${purpose}</b>

</p>

<p>

${details}

</p>

<div class="signature-box">

${
signature
?
`<img
src="${signature}"
style="
height:90px;
object-fit:contain;
">`
:
""
}

</div>

<div id="qrCodeContainer"
style="
margin-top:30px;
display:flex;
justify-content:center;
">
</div>

</div>

`;

generateQRCode();

}

/* =========================================
QR
========================================= */

function generateQRCode(){

const qr =
document.getElementById(
"qrCodeContainer"
);

if(!qr) return;

qr.innerHTML = "";

new QRCode(qr,{

text:
location.href,

width:140,
height:140

});

}

/* =========================================
PDF
========================================= */

function downloadPDF(){

html2pdf()
.from(
document.getElementById(
"previewArea"
)
)
.save(
"Affidavit.pdf"
);

}

/* =========================================
PNG
========================================= */

function exportPNG(){

html2canvas(
document.getElementById(
"previewArea"
)
).then(canvas=>{

const link =
document.createElement("a");

link.download =
"affidavit.png";

link.href =
canvas.toDataURL();

link.click();

});

}

/* =========================================
WHATSAPP
========================================= */

function shareWhatsApp(){

const text =
document.getElementById(
"previewArea"
).innerText;

window.open(
`https://wa.me/?text=${encodeURIComponent(text)}`,
"_blank"
);

}

/* =========================================
PWA FIX
========================================= */

let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt = e;

});

async function triggerInstallApp(){

if(!deferredPrompt){

alert(
"Use Chrome → Add to Home Screen"
);

return;

}

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

}

/* =========================================
SERVICE WORKER
========================================= */

if("serviceWorker" in navigator){

window.addEventListener(
"load",
()=>{

navigator.serviceWorker.register(
"./sw.js"
);

});

}

</script>

</body>
</html>
