<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Affidavit SaaS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center}
.container{max-width:700px;margin:auto;padding:20px}
.card{background:#222;padding:15px;margin:10px;border-radius:8px}
button{padding:8px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.approve{background:#28a745;color:#fff}
.reject{background:#dc3545;color:#fff}
</style>

</head>

<body>

<div class="container">

<h2>👑 Admin Panel</h2>

<h3>👥 Users</h3>
<div id="users"></div>

<h3>💸 Withdraw Requests</h3>
<div id="withdrawals"></div>

</div>

<script>

// ✅ FINAL FIREBASE CONFIG (ALREADY ADDED)
const firebaseConfig = {
  apiKey: "AIzaSyC_1bKbNGAoGviGt1-a1f27h9VDj4hr3oA",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
  storageBucket: "affidavittool.firebasestorage.app",
  messagingSenderId: "108525725649",
  appId: "1:108525725649:web:2c3cab440860c81e6de2f0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= LOAD USERS =================
function loadUsers(){
  db.collection("users").get().then(snapshot=>{
    let html = "";
    snapshot.forEach(doc=>{
      let d = doc.data();

      html += `
      <div class="card">
      <b>UID:</b> ${doc.id}<br>
      💰 Wallet: ₹${d.wallet || 0}<br>
      ⭐ Premium: ${d.premium ? "Yes" : "No"}
      </div>`;
    });

    document.getElementById("users").innerHTML = html;
  });
}

// ================= LOAD WITHDRAW =================
function loadWithdraw(){

  db.collection("withdrawals").get().then(snapshot=>{
    let html = "";

    snapshot.forEach(doc=>{
      let d = doc.data();

      html += `
      <div class="card">
      👤 ${d.uid}<br>
      💸 ₹${d.amount}<br>
      📌 Status: ${d.status}<br>

      <button class="approve" onclick="approve('${doc.id}','${d.uid}',${d.amount})">Approve</button>
      <button class="reject" onclick="reject('${doc.id}')">Reject</button>

      </div>`;
    });

    document.getElementById("withdrawals").innerHTML = html;
  });

}

// ================= APPROVE =================
function approve(id, uid, amount){

  db.collection("users").doc(uid).update({
    wallet: firebase.firestore.FieldValue.increment(-amount)
  });

  db.collection("withdrawals").doc(id).update({
    status:"approved"
  });

  alert("Approved ✅");
  loadWithdraw();
}

// ================= REJECT =================
function reject(id){

  db.collection("withdrawals").doc(id).update({
    status:"rejected"
  });

  alert("Rejected ❌");
  loadWithdraw();
}

// ================= INIT =================
loadUsers();
loadWithdraw();

</script>

</body>
</html>
