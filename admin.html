<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Earning SaaS</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
h2{text-align:center;margin-bottom:20px}
.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
button{
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.approve{background:#22c55e;color:#fff}
.reject{background:#ef4444;color:#fff}
.topbar{display:flex;margin-bottom:20px}
.search{padding:8px;width:100%;border-radius:6px;border:none}
.stats{display:flex;justify-content:space-around;margin-bottom:20px}
.stat{background:#1e293b;padding:10px;border-radius:8px;width:30%;text-align:center}
</style>

</head>

<body>

<div class="container">

<h2>👑 Admin Panel</h2>

<div class="topbar">
<input class="search" id="search" placeholder="Search user UID..." oninput="filterUsers()">
</div>

<div class="stats">
<div class="stat">👥 Users: <span id="totalUsers">0</span></div>
<div class="stat">💸 Requests: <span id="totalWithdraw">0</span></div>
<div class="stat">💰 Total ₹ <span id="totalAmount">0</span></div>
</div>

<h3>👥 Users</h3>
<div id="users"></div>

<h3>💸 Withdraw Requests</h3>
<div id="withdrawals"></div>

</div>

<!-- ✅ FIREBASE V9 (MODULE) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { 
  getFirestore, collection, doc, getDoc, onSnapshot, query, where, updateDoc, increment 
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC_1bkBNGAoGviGt1-a1f27h9VDj4hr3oA",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
  storageBucket: "affidavittool.appspot.com",
  messagingSenderId: "108525725649",
  appId: "1:108525725649:web:2c3cab440860c81e6de2f0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ⚠️ ADMIN UID DAALNA
const ADMIN_UID = "PUT_YOUR_UID_HERE";

// ================= SECURITY =================
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    alert("Login required ❌");
    location.href="index.html";
  }
  else if(user.uid !== ADMIN_UID){
    alert("Access Denied ❌");
    location.href="index.html";
  }
});

// ================= USERS =================
let allUsers=[];

function loadUsers(){
  onSnapshot(collection(db,"users"), (snapshot)=>{
    let html="";
    allUsers=[];

    document.getElementById("totalUsers").innerText = snapshot.size;

    snapshot.forEach(docSnap=>{
      let d=docSnap.data();
      allUsers.push({id:docSnap.id,...d});

      html+=`
      <div class="card">
      <b>UID:</b> ${docSnap.id}<br>
      💰 Wallet: ₹${d.wallet||0}<br>
      ⭐ Premium: ${d.premium ? "Yes" : "No"}
      </div>`;
    });

    document.getElementById("users").innerHTML=html;
  });
}

// ================= FILTER =================
window.filterUsers = function(){
  let val=document.getElementById("search").value.toLowerCase();
  let html="";

  allUsers.forEach(u=>{
    if(u.id.toLowerCase().includes(val)){
      html+=`
      <div class="card">
      <b>UID:</b> ${u.id}<br>
      💰 Wallet: ₹${u.wallet||0}<br>
      ⭐ Premium: ${u.premium ? "Yes" : "No"}
      </div>`;
    }
  });

  document.getElementById("users").innerHTML=html;
}

// ================= WITHDRAW =================
function loadWithdraw(){

  const q = query(collection(db,"withdrawals"), where("status","==","pending"));

  onSnapshot(q,(snapshot)=>{

    let html="";
    let total=0;

    document.getElementById("totalWithdraw").innerText=snapshot.size;

    snapshot.forEach(docSnap=>{
      let d=docSnap.data();
      total+=d.amount;

      html+=`
      <div class="card">
      👤 ${d.uid}<br>
      💸 ₹${d.amount}<br>

      <button class="approve" onclick="approve('${docSnap.id}','${d.uid}',${d.amount})">Approve</button>
      <button class="reject" onclick="reject('${docSnap.id}')">Reject</button>
      </div>`;
    });

    document.getElementById("totalAmount").innerText=total;
    document.getElementById("withdrawals").innerHTML=html;
  });
}

// ================= APPROVE =================
window.approve = async function(id, uid, amount){

  await updateDoc(doc(db,"users",uid),{
    wallet: increment(-amount)
  });

  await updateDoc(doc(db,"withdrawals",id),{
    status:"approved"
  });

  alert("Approved ✅");
}

// ================= REJECT =================
window.reject = async function(id){

  await updateDoc(doc(db,"withdrawals",id),{
    status:"rejected"
  });

  alert("Rejected ❌");
}

// ================= INIT =================
loadUsers();
loadWithdraw();

</script>

</body>
</html>
