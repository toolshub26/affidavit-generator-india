<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affidavit SaaS</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center}
.container{max-width:400px;margin:auto;padding:20px}
input{width:90%;padding:10px;margin:10px}
button{padding:12px 20px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.signup{background:#28a745;color:#fff}
.login{background:#007bff;color:#fff}
.buy{background:#ff9800;color:#fff}
</style>

</head>

<body>

<div class="container">

<h2>🚀 Affidavit SaaS</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<br>

<button class="signup" onclick="signup()">Signup</button>
<button class="login" onclick="login()">Login</button>

<hr>

<input id="ref" placeholder="Referral Code (optional)">
<button class="buy" onclick="buy()">Buy Premium ₹99</button>

<h3 id="status">Checking...</h3>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC_1bKbNGAoGviGt1-a1f27h9VDj4hr3oA",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
  storageBucket: "affidavittool.firebasestorage.app",
  messagingSenderId: "108525725649",
  appId: "1:108525725649:web:2c3cab440860c81e6de2f0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ================= SIGNUP =================
function signup(){

  let email = emailEl.value.trim();
  let password = passwordEl.value.trim();

  if(!email || !password){
    alert("Fill all fields ❗");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
  .then(res=>{

    let uid = res.user.uid;
    let refCode = uid.substring(0,6);

    db.collection("users").doc(uid).set({
      premium:false,
      wallet:0,
      refCode:refCode,
      usedReferral:false
    });

    alert("Signup Success ✅");
  })
  .catch(err=>alert(err.message));
}

// ================= LOGIN =================
function login(){

  let email = emailEl.value.trim();
  let password = passwordEl.value.trim();

  auth.signInWithEmailAndPassword(email, password)
  .then(()=>{
    alert("Login Success ✅");
    window.location.href = "/affidavit-generator-india/dashboard.html";
  })
  .catch(err=>alert(err.message));
}

// ================= AUTH CHECK =================
auth.onAuthStateChanged(user=>{
  document.getElementById("status").innerText = user ? "Logged In ✅" : "Not Logged In ❌";
});

// ================= BUY PREMIUM =================
function buy(){

  let user = auth.currentUser;
  let refInput = document.getElementById("ref").value.trim();

  if(!user){
    alert("Login first ❗");
    return;
  }

  var options = {
    key: "rzp_test_xxxxxxxx", // 👉 replace with live key
    amount: 9900,
    currency: "INR",
    name: "Affidavit Tool",
    description: "Premium Plan",

    handler: async function (){

      let expiry = Date.now() + (30*24*60*60*1000);

      let userRef = db.collection("users").doc(user.uid);
      let userDoc = await userRef.get();
      let userData = userDoc.data();

      await userRef.update({
        premium:true,
        expiry:expiry
      });

      // 🔥 DOUBLE EARNING SYSTEM
      if(refInput && !userData.usedReferral){

        let snapshot = await db.collection("users")
        .where("refCode","==",refInput)
        .get();

        snapshot.forEach(async doc=>{

          // ₹20 to referrer
          await db.collection("users").doc(doc.id).update({
            wallet: firebase.firestore.FieldValue.increment(20)
          });

          // ₹10 to new user
          await userRef.update({
            wallet: firebase.firestore.FieldValue.increment(10),
            usedReferral:true
          });

          // save history
          await db.collection("referrals").add({
            referrer: doc.id,
            newUser: user.uid,
            amountReferrer:20,
            amountNewUser:10,
            time:Date.now()
          });

        });
      }

      alert("Premium Activated 🚀");
      window.location.href="/affidavit-generator-india/dashboard.html";
    }
  };

  new Razorpay(options).open();
}

// shorthand
const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");

</script>

</body>
</html>
