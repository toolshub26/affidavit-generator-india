<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affidavit Generator India (AGI) – Professional Court Version</title>

<link rel="stylesheet" href="style.css">

<!-- QR Code Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

</head>

<body>

<div class="container">

<header>
<h1>Affidavit Generator India (AGI)</h1>
<p class="tagline">Professional Court-Ready Affidavit Tool</p>
</header>

<section class="form-section">

<!-- PREMIUM STATUS BADGE -->
<div id="premiumStatus"></div>

<h2>Affidavit Details</h2>

<label>Language</label>
<select id="lang">
<option value="english">English</option>
<option value="hindi">Hindi</option>
<option value="urdu">Urdu</option>
</select>

<label>Template Type</label>
<select id="template">
<option value="general">General Declaration (Free)</option>
<option value="name">Name Correction (Premium)</option>
<option value="address">Address Change (Premium)</option>
<option value="dob">DOB Correction (Premium)</option>
<option value="lost">Lost Document (Premium)</option>
<option value="marriage">Marriage Affidavit (Premium)</option>
<option value="income">Income Affidavit (Premium)</option>
<option value="identity">Identity Proof (Premium)</option>
<option value="property">Property Declaration (Premium)</option>
<option value="gap">Gap Certificate (Premium)</option>
</select>

<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>

<label>Full Name</label>
<input type="text" id="name">

<label>Father / Husband Name</label>
<input type="text" id="father">

<label>Age</label>
<input type="number" id="age">

<label>Full Address</label>
<textarea id="address"></textarea>

<label>Affidavit Purpose</label>
<textarea id="purpose"></textarea>

<label>State</label>
<select id="state">
<option value="">Select State</option>
<option>Jammu & Kashmir</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Uttar Pradesh</option>
<option>Karnataka</option>
<option>Gujarat</option>
<option>Tamil Nadu</option>
<option>West Bengal</option>
<option>Rajasthan</option>
<option>Punjab</option>
</select>

<label>Stamp Value</label>
<select id="stamp">
<option value="">Select Stamp</option>
<option>₹10</option>
<option>₹20</option>
<option>₹50</option>
<option>₹100</option>
<option>₹500</option>
</select>

<label>Place</label>
<input type="text" id="place">

<label>Date</label>
<input type="date" id="date">

<label>Additional Declaration (Premium)</label>
<textarea id="customParagraph"></textarea>

<div class="toggle-group">
<label>
<input type="checkbox" id="addWitness">
Add Witness Section (Premium)
</label>
</div>

<div class="button-group">
<button onclick="generateAffidavit()">Generate Preview</button>
<button onclick="printAffidavit()">Print A4</button>
<button id="downloadBtn" onclick="downloadPDF()">Download PDF (Premium)</button>
<button onclick="unlockPremium()">Upgrade to Premium</button>
</div>

</section>

<section class="preview-section" id="previewSection">
<div id="previewArea" class="document-preview"></div>
</section>

<footer>
<p>© 2026 Affidavit Generator India | All Rights Reserved</p>
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
